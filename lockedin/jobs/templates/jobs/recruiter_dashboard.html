{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Main big containner -->
<div class="container mt-4 mb-5">
    <!-- Make header thingy -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-briefcase"></i> Recruiter Dashboard</h2>
        <a href="{% url 'jobs.post' %}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Post New Job
        </a>
    </div>

    <!-- If there are jobs available -->
    {% if jobs %}
        <!-- Main dashboard item -->
        <div class="row">

        </div>

    <!-- No Jobs Available-->
    {% else %}
        <!-- Say there are no jobs -->
        <div class="alert alert-info text-center">

        </div>
    {% endif %}

</div>

{% endblock %}
