{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Chat with {{ other_user.username }}</h4>
                </div>
                <div class="card-body" style="height: 500px; overflow-y: auto;">
                    {% for msg in messages %}
                        <div class="d-flex mb-3 {% if msg.sender == request.user %}justify-content-end{% else %}justify-content-start{% endif %}">
                            <div class="message-bubble {% if msg.sender == request.user %}bg-primary text-white{% else %}bg-light text-dark{% endif %} p-2 rounded" style="max-width: 70%;">
                                <p class="mb-1">{{ msg.content }}</p>
                                <small class="text-muted">{{ msg.sent_time|date:"M d, H:i" }}</small>
                            </div>
                        </div>
                    {% empty %}
                        <p class="text-center text-muted mt-3">No messages yet. Say hello!</p>
                    {% endfor %}
                </div>
                <div class="card-footer">
                    <form method="post">
                        {% csrf_token %}
                        <div class="input-group">
                            <input type="text" name="content" class="form-control" placeholder="Type a message..." required>
                            <button class="btn btn-primary" type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.message-bubble {
    border-radius: 15px;
    word-wrap: break-word;
}

.bg-primary {
    background-color: #0d6efd !important;
}
</style>

{% endblock content %}
